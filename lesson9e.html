<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson9e</title>
<style>
.tweet-box{
  width: 450px;
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(0,0,0,0.3);
}

.profile{
  width: 50px;
  height: 50px;
  border-radius: 50%;
  vertical-align: middle;
}

input{
  border: none;
  font-size: 16px;
  width: 250px;
  vertical-align: middle;
}

button{
  background-color: #1da1f2;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 15px;
  font-weight: bold;
}
</style>
</head>
<body>
<h1>Lesson 9e</h1>
<div class="tweet-box">
  <img src="kucing.jfif" class="profile">
  <input type="text" placeholder="What's happening?">
  <button>Tweet</button>
</div>

</body>
