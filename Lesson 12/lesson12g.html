<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson12f</title>
<style>
p {
  margin: 0;
  font-family: Arial;
}

.profile {
  display: flex;
  align-items: center;

  width: 400px;
  margin-bottom: 15px;
}

.profile-picture {
  width: 50px;
  height: 50px;
  border-radius: 25px;
  object-fit: cover;
}

.info {
  flex: 1;
  margin-left: 15px;
}

.name {
  font-weight: bold;
  margin-bottom: 3px;
}

.type,
.status {
  color: gray;
  margin-bottom: 3px;
}

.follow-button {
  background-color: rgb(24, 119, 242);
  color: white;
  border: none;
  border-radius: 4px;

  padding: 8px 12px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>
<h1>Lesson 12f</h1>
<div class="profile">

  <img class="profile-picture" src="kucing3.jpg">

  <div class="info">
    <p class="name">oliver</p>
    <p class="type">the cat</p>
    <p class="status">Popular</p>
  </div>

  <button class="follow-button">
    Follow
  </button>

</div>

<div class="profile">

  <img class="profile-picture" src="kucing.jpg">

  <div class="info">
    <p class="name">Mimi</p>
    <p class="type">Sleepy Cat</p>
    <p class="status">Popular</p>
  </div>

  <button class="follow-button">
    Follow
  </button>

</div>

<div class="profile">

  <img class="profile-picture" src="kucing2.jpg">

  <div class="info">
    <p class="name">Rex</p>
    <p class="type">Happy Bulldog</p>
    <p class="status">Popular</p>
  </div>

  <button class="follow-button">
    Follow
  </button>

</div>
</body>
</html>
