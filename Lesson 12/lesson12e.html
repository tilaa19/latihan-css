<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson12e</title>
<style>
.notif {
  width: 300px;
  border: 1px solid lightgray;
  border-radius: 6px;
  padding: 10px;
  font-family: Arial;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.row:last-child {
  margin-bottom: 0;
}

.count {
  background-color: rgb(49, 109, 245);
  color: white;
  font-weight: bold;
  padding: 3px 10px;
  border-radius: 15px;
}
</style>
</head>
<body>
<h1>Lesson 12e</h1>
<div class="notif">

  <div class="row">
    <div>Home</div>
    <div class="count">14</div>
  </div>

  <div class="row">
    <div>Notifications</div>
    <div class="count">3</div>
  </div>

  <div class="row">
    <div>Messages</div>
    <div class="count">5</div>
  </div>

</div>
</body>
</html>
