<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson15f</title>
<style>
.product-container {
  position: relative;
  display: inline-block;
}

.product-image {
  width: 300px;
  display: block;
}

.discount-label {
  position: absolute;
  top: 10px;
  right: 0;

  background-color: black;
  color: white;
  padding: 8px 12px;
  font-family: Arial;
  font-size: 14px;
}

.overlay {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 100px;
  background-color: rgba(255, 255, 255, 0.8);
  display: flex;
  justify-content: center;
  align-items: center;
}

.add-to-cart-button {
  background-color: white;
  border: 1px solid black;

  padding: 10px 18px;

  cursor: pointer;
}
</style>
</head>
<body>
<h1>Lesson 15f</h1>
<div class="product-container">
  <img class="product-image" src="tshirt.jpg">

  <div class="discount-label">
    20% OFF
  </div>

  <div class="overlay">
    <button class="add-to-cart-button">
      Add to Cart
    </button>
  </div>
</div>
</body>
</html>
