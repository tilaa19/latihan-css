<!DOCTYPE html>
<html>
<head>
    <title>lesson10d</title>
<style>
body{
    font-family: Arial, sans-serif;
}

.card{
    width: 180px;
    border: 1px solid #ccc;
    padding: 10px;
    margin: 10px;
    display: inline-block;
    vertical-align: top;
    box-shadow: 0 0 5px rgba(0,0,0,0.2);
}

.card img{
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h3{
    margin: 10px 0 5px;
}

.card p{
    color: gray;
    font-size: 14px;
}

button{
    background-color: #1877f2;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
}

button:hover{
    opacity: 0.8;
}
</style>
</head>
<body>
<h1>Lesson 10d</h1>
<div class="card">
    <img src="kucing.jfif" alt="Oliver">
    <h3>Oliver</h3>
    <p>2 mutual friends</p>
    <button>Add Friend</button>
</div>

<div class="card">
    <img src="kucing2.jfif" alt="Mimi">
    <h3>Mimi</h3>
    <p>3 mutual friends</p>
    <button>Add Friend</button>
</div>

<div class="card">
    <img src="kucing3.jfif" alt="Rex">
    <h3>Rex</h3>
    <p>4 mutual friends</p>
    <button>Add Friend</button>
</div>
</body>
</html>
