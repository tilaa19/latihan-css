<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson10d</title>
<style>
p {
  font-family: Arial;
  margin: 0;
}

.card {
  width: 200px;
  display: inline-block;
  vertical-align: top;
  margin-right: 12px;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
}

.animal-picture {
  width: 200px;
  height: 200px;
  object-fit: cover;
}

.info {
  padding: 8px;
}

.name {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 6px;
}

.mutual {
  margin-bottom: 10px;
}

.friend-picture {
  width: 28px;
  height: 28px;
  border-radius: 14px;
  object-fit: cover;
  vertical-align: middle;
}

.mutual-friends {
  display: inline-block;
  vertical-align: middle;
  color: gray;
  margin-left: 4px;
}

.add-button {
  background-color: rgb(24, 119, 242);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 8px 14px;
  cursor: pointer;
}
</style>
</head>
<body>
<h1>Lesson 10d</h1>
  <div class="card">
    <img class="animal-picture" src="kucing.jpg">

    <div class="info">
      <p class="name">Oliver</p>

      <div class="mutual">
        <img class="friend-picture" src="kucing2.jpg">
        <p class="mutual-friends">2 mutual friends</p>
      </div>

      <button class="add-button">
        Add Friend
      </button>
    </div>
  </div>

  <div class="card">

    <img class="animal-picture" src="kucing3.jpg">

    <div class="info">
      <p class="name">Mimi</p>

      <div class="mutual">
        <img class="friend-picture" src="kucing.jpg">
        <p class="mutual-friends">3 mutual friends</p>
      </div>

      <button class="add-button">
        Add Friend
      </button>
    </div>
  </div>

  <div class="card">

    <img class="animal-picture" src="kucing2.jpg">

    <div class="info">
      <p class="name">Rex</p>

      <div class="mutual">
        <img class="friend-picture" src="kucing3.jpg">
        <p class="mutual-friends">4 mutual friends</p>
      </div>

      <button class="add-button">
        Add Friend
      </button>
    </div>
  </div>
</body>
</html>
