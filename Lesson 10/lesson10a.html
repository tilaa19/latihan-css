<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson10a</title>
<style>
.card{
  display: flex;   
  align-items: center;
  width: 350px;
}

.profile-pic{
  width: 50px;
  height: 50px;
  border-radius: 25px;
}

.info{
  margin-left: 12px;
  flex: 1;
}

.name,
.type,
.status{
  margin: 0;
}

.follow-btn{
  background-color: #4a90e2;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 5px;
}
</style>
</head>
<body>
<h1>Lesson 10a</h1>
<div class="card">
  <img src="kucing.jfif" class="profile-pic">
  <div class="info">
    <p class="name">Oliver</p>
    <p class="type">the cat</p>
    <p class="status">Popular</p>
  </div>
  <button class="follow-btn">
    Follow
  </button>
</div>
</body>
</html>
