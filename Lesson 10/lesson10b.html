<!DOCTYPE html>
<html>
<head>
<style>
.profile-row{
  width: 400px;
  display: flex;
  align-items: center;
  margin-bottom: 15px;
}

.profile-picture{
  width: 60px;
  height: 60px;
  border-radius: 30px;
  object-fit: cover;
}

.profile-info{
  flex: 1;
  margin-left: 15px;
}

.name{
  font-weight: bold;
  margin: 0;
}

.type{
  color: gray;
  margin: 3px 0;
}

.status{
  color: gray;
  margin: 0;
  font-size: 14px;
}

.follow-button{
  background-color: rgb(24, 119, 242);
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>
<h1>Lesson 10b</h1>
<div class="profile-row">
  <img class="profile-picture" src="kucing.jfif">

  <div class="profile-info">
    <p class="name">Oliver</p>
    <p class="type">the cat</p>
    <p class="status">Popular</p>
  </div>

  <button class="follow-button">
    Follow
  </button>
</div>

<div class="profile-row">
  <img class="profile-picture" src="kucing2.jfif">

  <div class="profile-info">
    <p class="name">Mimi</p>
    <p class="type">Sleepy Cat</p>
    <p class="status">Popular</p>
  </div>

  <button class="follow-button">
    Follow
  </button>
</div>

<div class="profile-row">
  <img class="profile-picture" src="kucing3.jfif">

  <div class="profile-info">
    <p class="name">Rex</p>
    <p class="type">Happy Bulldog</p>
    <p class="status">Popular</p>
  </div>

  <button class="follow-button">
    Follow
  </button>
</div>

</body>
</html>
