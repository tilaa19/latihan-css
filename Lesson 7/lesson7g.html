<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson7g</title>
<style>
.tweet-box {
    padding: 10px;
    border: 1px solid #ddd;
    width: 450px;
}

.tweet-box img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    vertical-align: middle;
}

.tweet-box input {
    border: none;
    font-size: 16px;
    vertical-align: middle;
    margin-left: 10px;
}

.tweet-box button {
    background-color: #1d9bf0;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 8px 15px;
    font-weight: bold;
    vertical-align: middle;
}
</style>
</head>
<body>
    <h1>Lesson 7g</h1>
<div class="tweet-box">
    <img src="kucing.jfif" alt="Kucing">

    <input type="text" placeholder="What's happening?">

    <button>Tweet</button>
</div>
</body>
</html>
