<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson13g</title>
<style>
body {
  font-family: Arial;
}

.tweet {
  display: flex;
  width: 420px;
}

.profile-picture {
  width: 50px;
  height: 50px;
  border-radius: 25px;
  object-fit: cover;
  margin-right: 10px;
}

.tweet-content {
  flex: 1;
}

.tweet-header {
  display: flex;
  margin-bottom: 5px;
}

.username {
  font-weight: bold;
  margin-right: 5px;
}

.handle {
  color: rgb(111, 111, 111);
}

.tweet-text {
  margin-bottom: 15px;
  line-height: 20px;
}

.link-preview {
  display: flex;
  align-items: center;

  border: 1px solid rgb(220, 220, 220);
  border-radius: 15px;
  overflow: hidden;
}

.thumbnail {
  width: 100px;
  height: 100px;
  background-color: rgb(220, 220, 220);
}

.link-info {
  flex: 1;
  padding-left: 12px;
}

.website {
  color: rgb(111, 111, 111);
  margin-bottom: 5px;
}

.video-title {
  line-height: 22px;
}
</style>
</head>
<body>
<h1>Lesson 13g</h1>
<div class="tweet">

  <img class="profile-picture" src="kucing.jpg">

  <div class="tweet-content">

    <div class="tweet-header">
      <span class="username">supersimple.dev</span>
      <span class="handle">@SuperSimpleDev</span>
    </div>

    <div class="tweet-text">
      What is backend web development? A complete overview.
      New video is up!
    </div>

    <div class="link-preview">
      <div class="thumbnail"></div>

      <div class="link-info">
        <div class="website">youtube.com</div>

        <div class="video-title">
          Backend web development - a complete overview (2021)
        </div>
      </div>
    </div>

  </div>

</div>
</body>
</html>
