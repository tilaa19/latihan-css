<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson14d</title>
<style>
body {
  height: 3000px;
  font-family: Arial;
}

.sidebar {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;

  width: 100px;

  background-color: green;
  color: white;
}

.overlay {
  position: fixed;

  top: 0;
  left: 0;
  right: 0;
  bottom: 0;

  background-color: rgba(0, 0, 0, 0.8);

  display: flex;
  justify-content: center;
  align-items: center;
}

.modal {
  background-color: white;

  width: 300px;

  padding: 15px;
  border-radius: 5px;
}

.modal-title {
  margin-top: 0;
  margin-bottom: 10px;

  font-size: 24px;
  font-weight: bold;
}

.modal-content {
  margin-bottom: 12px;
}
</style>
</head>
<body>
<h1>Lesson 14d</h1>
  <div class="sidebar">
    right sidebar
  </div>

  <div class="overlay">
    <div class="modal">
      <h2 class="modal-title">Modal Title</h2>

      <p class="modal-content">
        This is a modal
      </p>

      <button>
        Close
      </button>
    </div>
  </div>

</body>
</html>
