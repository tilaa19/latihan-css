<!DOCTYPE html>
<html>
<head>
    <title>Uber Request Form</title>
<style>
body {
    font-family: Arial, sans-serif;
}

.uber-form {
    width: 400px;
}

h1 {
    font-size: 36px;
    font-weight: normal;
}

.uber-form input {
    display: block;
    width: 350px;
    padding: 12px;
    margin-bottom: 8px;
    border: none;
    background-color: #f1f1f1;
}

.request-btn {
    background-color: black;
    color: white;
    border: none;
    padding: 12px 18px;
    margin-top: 20px;
    margin-right: 10px;
    cursor: pointer;
}

.schedule-btn {
    background-color: #f1f1f1;
    color: black;
    border: none;
    padding: 12px 18px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="uber-form">
    <h1>Request a ride now</h1>
    <input type="text" placeholder="Enter pickup location">
    <input type="text" placeholder="Enter destination">
    <button class="request-btn">
        Request now
    </button>
    <button class="schedule-btn">
        Schedule for later
    </button>
</div>

</body>
</html>
