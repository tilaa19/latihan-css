<!DOCTYPE html>
<html>
<head>
    <title>Sign Up Form</title>
    <style>
.signup-form {
    width: 300px;
}

.first-name {
    width: 135px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    display: inline-block;
    margin-bottom: 10px;
}

.email {
    width: 282px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    display: block;
    margin-bottom: 10px;
}

button {
    width: 304px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background-color: #4285f4;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
    </style>
</head>
<body>
<h1>Lesson 8d</h1>
<div class="signup-form">
    <input class="first-name" type="text" placeholder="First name">
    <input class="first-name" type="text" placeholder="First name">
    <input class="email" type="email" placeholder="Email">
    <button>Sign Up</button>
</div>

</body>
</html>
