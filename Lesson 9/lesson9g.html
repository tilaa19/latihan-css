<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson9g</title>
<style>
.profile-card{
  width: 180px;
  border: 1px solid #ddd;
  padding-bottom: 10px;
  display: inline-block;
  margin-right: 10px;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
}

.animal{
  width: 180px;
  height: 180px;
  object-fit: cover;
}

.name{
  font-weight: bold;
  margin: 8px;
}

.friends{
  color: gray;
  margin: 8px;
}

button{
  background-color: #1877f2;
  color: white;
  border: none;
  padding: 8px 12px;
  margin-left: 8px;
  border-radius: 4px;
  cursor: pointer;
}
</style>
</head>
<body>
<h1>Lesson 9g</h1>
<div class="profile-card">
  <img src="kucing.jfif" class="animal">
  <p class="name">Oliver</p>
  <p class="friends">2 mutual friends</p>
  <button>Add Friend</button>
</div>

<div class="profile-card">
  <img src="kucing2.jfif" class="animal">
  <p class="name">Mimi</p>
  <p class="friends">3 mutual friends</p>
  <button>Add Friend</button>
</div>

<div class="profile-card">
  <img src="kucing3.jfif" class="animal">
  <p class="name">Rex</p>
  <p class="friends">4 mutual friends</p>
  <button>Add Friend</button>
</div>
</body>
</html>
