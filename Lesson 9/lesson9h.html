<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lesson9h</title>
<style>
.logo-row {
  text-align: center;
  margin-top: 50px;
}

.search-row {
  text-align: center;
  margin-top: 20px;
}

.button-row {
  text-align: center;
  margin-top: 30px;
}

.logo {
  width: 300px;
}

.search-bar {
  width: 500px;
  padding: 12px;
  border: none;
  border-radius: 25px;
  box-shadow: 0 0 6px rgba(0,0,0,0.25);
  font-size: 16px;
}

.google-btn {
  border: none;
  padding: 10px 18px;
  margin-right: 10px;
  background-color: #f5f5f5;
  cursor: pointer;
}

.lucky-btn {
  border: none;
  padding: 10px 18px;
  background-color: #f5f5f5;
  cursor: pointer;
}
</style>
</head>
<body>
<h1>Lesson 9h</h1> 
<div class="logo-row">
  <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png">
</div>

<div class="search-row">
  <input class="search-bar" type="text" placeholder="Search Google or type a URL">
</div>

<div class="button-row">
  <button class="google-btn">Google Search</button>
  <button class="lucky-btn">I'm Feeling Lucky</button>
</div>

</body>
</html>
