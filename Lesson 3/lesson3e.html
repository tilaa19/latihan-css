<head>

    <title>lesson3e</title>
    <style>
 .linkedin-apply{
  background:rgb(10,102,194);
  color:white;

}

.linkedin-apply:hover{

}

.linkedin-save{

  border-radius:25px;
  font-weight:bold;
  transition:border-width 0.15s,
             background-color 0.15s;
}

.linkedin-save:hover{
  border-width:2px;
  background:rgba(10,102,194,0.1);
}

</head>
