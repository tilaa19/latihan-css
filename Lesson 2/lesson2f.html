<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.link {
  color: rgb(0, 113, 133);
}

h1 {
  font-size: 28px;
  margin: 15px 0;
}

.price {
  color: rgb(0, 118, 0);
  font-weight: bold;
}

.shipping {
  color: black;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.cart-btn {
  background-color: rgb(255, 216, 20);
  border: none;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
}

.buy-btn {
  background-color: rgb(255, 164, 28);
  border: none;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
}
    </style>
</head>
<body>
  <a href="amazon.com" class="link">Back to Amazon</a>

  <h1>Nike Black Running Shoes</h1>

  <p class="price">$39 - in stock.</p>

  <p class="shipping">Free delivery tomorrow.</p>

    <div class="buttons">
    <button class="cart-btn">Add to Cart</button>
    <button class="buy-btn">Buy now</button>
    </div>
</div>
</body>
</html>
